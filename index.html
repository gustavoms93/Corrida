<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asphalt Escape v10.7 - GMS Elite</title>
    <style>
        :root { --gms-green: #1b5e20; --gold: #f1c40f; --danger: #e74c3c; --road: #222; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white; touch-action: none; user-select: none; }
        canvas { display: block; margin: auto; background: var(--road); }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 100; text-align: center; padding: 20px; }
        .btn-main { padding: 18px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; box-shadow: 0 5px 0 #b7950b; text-transform: uppercase; margin: 10px; transition: 0.1s; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #b7950b; }
        
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; display: none; justify-content: space-between; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        .fuel-bar { width: 120px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; border: 1px solid #fff; }
        #fuel-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }
        
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 50; }
        .dir-controls { display: flex; gap: 15px; }
        .ctrl-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; opacity: 0.7; pointer-events: auto; }
        
        .pedal-btn { width: 85px; height: 115px; background: linear-gradient(#444, #222); border: 3px solid #777; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; color: #fff; pointer-events: auto; box-shadow: 0 4px #000; }
        .pedal-btn:active { transform: translateY(4px); box-shadow: 0 0 #000; background: #111; }

        .gms-msg { position: absolute; top: 20%; width: 100%; text-align: center; font-weight: bold; color: var(--gold); font-size: 24px; display: none; z-index: 100; text-shadow: 2px 2px #000; }
        .ranking-list { font-size: 16px; color: var(--gold); list-style: none; padding: 0; margin: 15px 0; font-weight: bold; }
        .insta-link { color: var(--gold); text-decoration: none; font-weight: bold; border-bottom: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="msg-box" class="gms-msg">EASTER EGG ENCONTRADO!</div>

<div id="menu-main" class="overlay">
    <h1 style="color: var(--gold); font-size: 45px; margin: 0; text-shadow: 2px 2px #000;">ASPHALT ESCAPE</h1>
    <p style="color: #2ecc71; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px;">"Dirija rápido. Desvie. Sobreviva."</p>
    
    <ul id="ranking-list" class="ranking-list"></ul>

    <button class="btn-main" onclick="initGame()">CORRER AGORA</button>
    
    <div style="font-size: 13px; margin-top: 20px; opacity: 0.9;">
        Criado por <b>Gustavo Moreira</b><br>
        <a href="https://www.instagram.com/eng.florestalgustavoms" target="_blank" class="insta-link">@eng.florestalgustavoms</a> | v10.7
    </div>
</div>

<div id="menu-over" class="overlay" style="display: none;">
    <h1 id="medal-txt" style="margin: 0; font-size: 30px;">🥉 BRONZE</h1>
    <h2 style="font-size: 45px; margin: 10px 0; color: white;">SCORE: <span id="final-score-val">0</span></h2>
    
    <button id="btn-revive" class="btn-main" onclick="revive()" style="background: #3498db; color: white; box-shadow: 0 5px 0 #2980b9; display: none; font-size: 16px;">
        RENASCER (300 🪙)
    </button>

    <button class="btn-main" onclick="shareChallenge()" style="background: var(--gms-green); color: white; box-shadow: 0 5px 0 #0d3d14; width: 280px; font-size: 18px;">
        DESAFIAR AMIGOS 🚀
    </button>
    
    <button class="btn-main" onclick="initGame()" style="background: #444; color: white; box-shadow: 0 5px 0 #222; font-size: 16px;">NOVO JOGO</button>
</div>

<div id="ui">
    <div>
        <div id="km-txt" style="font-size: 18px; font-weight: bold;">0 KM/H</div>
        <div class="fuel-bar"><div id="fuel-fill"></div></div>
    </div>
    <div style="text-align: right;">
        <div style="color: var(--gold); font-size: 26px; font-weight: bold;">🪙 <span id="coin-txt">0</span></div>
        <div id="score-txt" style="font-weight: bold; font-size: 20px;">0</div>
    </div>
</div>

<div class="controls" id="game-ctrls" style="display:none">
    <div class="dir-controls">
        <div class="ctrl-btn" onpointerdown="movePlayer(-1)">◀</div>
        <div class="ctrl-btn" onpointerdown="movePlayer(1)">▶</div>
    </div>
    <div class="pedal-btn" id="gas-pedal">
        <span style="font-size: 20px;">GAS</span>
        <small style="opacity: 0.6;">ACELERA</small>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameActive = false, score = 0, speed = 7, fuel = 100, coins = 0;
let enemies = [], items = [], scenery = [], raf, isAccelerating = false;
let player = { lane: 1, x: 0, y: 0, w: 52, h: 88, targetX: 0 };

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = window.innerHeight;
    player.y = canvas.height - 210;
    updateTargetX();
}
window.addEventListener('resize', resize);
resize();

// --- SISTEMA DE ACELERAÇÃO ---
const gasPedal = document.getElementById("gas-pedal");
gasPedal.addEventListener("pointerdown", () => isAccelerating = true);
gasPedal.addEventListener("pointerup", () => isAccelerating = false);
gasPedal.addEventListener("pointerleave", () => isAccelerating = false);

// --- COMPARTILHAMENTO v10.7 (MENSAGEM CHAMATIVA) ---
async function shareChallenge() {
    const gameUrl = "https://gustavoms93.github.io/Corrida/";
    const shareText = `🔥 DESAFIO ASPHALT ESCAPE v10.7 🔥\n\nFiz ${Math.floor(score)} pontos! Duvido você bater meu recorde na rodovia da GMS! 🚗💨\n\n👉 JOGUE AGORA: ${gameUrl}\n\nCriado por @eng.florestalgustavoms`;

    if (navigator.share) {
        try {
            await navigator.share({ title: 'Asphalt Escape v10.7', text: shareText, url: gameUrl });
        } catch (err) {}
    } else {
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`);
    }
}

function revive() {
    if(coins >= 300) {
        coins -= 300; document.getElementById("coin-txt").innerText = coins;
        fuel = 100; enemies = []; items = [];
        document.getElementById("menu-over").style.display = "none";
        document.getElementById("ui").style.display = "flex";
        gameActive = true; update();
    }
}

function loadRanking() {
    const ranks = JSON.parse(localStorage.getItem('gms_ranks') || "[]");
    document.getElementById("ranking-list").innerHTML = ranks.length ? 
        ranks.map((s, i) => `<li>${i+1}º - ${s} pts</li>`).join("") : "Nenhum recorde ainda!";
}
loadRanking();

function updateTargetX() { player.targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - (player.w / 2); }
function movePlayer(dir) { if(!gameActive) return; player.lane = Math.max(0, Math.min(2, player.lane + dir)); updateTargetX(); }

function initGame() {
    score = 0; speed = 7; fuel = 100; coins = 0; enemies = []; items = []; scenery = []; isAccelerating = false;
    player.lane = 1; updateTargetX(); player.x = player.targetX;
    document.getElementById("coin-txt").innerText = "0";
    document.getElementById("menu-main").style.display = "none";
    document.getElementById("menu-over").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    document.getElementById("game-ctrls").style.display = "flex";
    gameActive = true;
    if(raf) cancelAnimationFrame(raf);
    update();
}

function drawVehicle(v) {
    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(v.x+5, v.y+5, v.w, v.h);
    ctx.fillStyle = v.color || "#444";
    ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 10); ctx.fill();
    if(v.isEasterEgg) {
        ctx.fillStyle = "white"; ctx.font = "bold 13px Arial";
        ctx.save(); ctx.translate(v.x+v.w-5, v.y+v.h-15); ctx.rotate(-Math.PI/2);
        ctx.fillText("GMS FLORESTAL", 0, 0); ctx.restore();
    }
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(v.x+8, v.y+12, v.w-16, 24);
}

function update() {
    if(!gameActive) return;
    ctx.fillStyle = "#222"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    if(Math.random() < 0.05) scenery.push({ x: Math.random() < 0.5 ? 5 : canvas.width - 25, y: -50, type: Math.random() > 0.5 ? '🌵' : '🌳' });
    scenery.forEach((s, i) => {
        s.y += speed; ctx.font = "20px Arial"; ctx.fillText(s.type, s.x, s.y);
        if(s.y > canvas.height) scenery.splice(i, 1);
    });

    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.setLineDash([40, 60]);
    ctx.lineDashOffset = -(score * 12);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*(canvas.width/3), 0); ctx.lineTo(i*(canvas.width/3), canvas.height); ctx.stroke();
    }

    player.x += (player.targetX - player.x) * 0.2;
    drawVehicle({...player, color: "#e74c3c"});

    if(Math.random() < 0.03) items.push({ type: Math.random() > 0.82 ? 'gas' : 'coin', x: (Math.floor(Math.random()*3) * (canvas.width/3)) + (canvas.width/6), y: -50 });
    items.forEach((it, i) => {
        it.y += speed; ctx.font = "22px Arial"; ctx.fillText(it.type === 'coin' ? '🪙' : '⛽', it.x-11, it.y);
        if(Math.hypot(player.x+26 - it.x, player.y+44 - it.y) < 42) {
            if(it.type === 'coin') { coins += 10; document.getElementById("coin-txt").innerText = coins; }
            else fuel = Math.min(100, fuel + 35);
            items.splice(i, 1);
        }
    });

    // LÓGICA ANTI-PAREDÃO REFORÇADA (v10.7)
    if(Math.random() < 0.022 + (score/120000)) {
        let lane = Math.floor(Math.random()*3);
        let topEnemies = enemies.filter(e => e.y < 350);
        // Garante que nunca 3 pistas fiquem ocupadas ao mesmo tempo no topo
        if(!enemies.some(e => e.lane === lane && e.y < 450) && topEnemies.length < 2) {
            let isEE = Math.random() < 0.02;
            enemies.push({
                lane, x: (lane * (canvas.width / 3)) + (canvas.width / 6) - 26,
                y: -200, w: 52, h: isEE ? 165 : 88,
                color: isEE ? "#1b5e20" : "#2980b9", isEasterEgg: isEE, speed: 2.2 + Math.random()*2
            });
        }
    }

    enemies.forEach((e, i) => {
        e.y += e.speed + (speed * 0.45); drawVehicle(e);
        if(player.x+10 < e.x+e.w-10 && player.x+player.w-10 > e.x+10 && player.y+10 < e.y+e.h-10 && player.y+player.h-10 > e.y+10) {
            gameOver();
        }
        if(e.y > canvas.height) enemies.splice(i, 1);
    });

    if(gameActive) {
        let accelMult = isAccelerating ? 2.2 : 1;
        score += 1 * accelMult;
        fuel -= 0.038 * accelMult;
        speed = (7 + (score/6500)) * (isAccelerating ? 1.35 : 1);

        document.getElementById("fuel-fill").style.width = fuel + "%";
        document.getElementById("score-txt").innerText = Math.floor(score);
        document.getElementById("km-txt").innerText = Math.floor(speed * 16) + " KM/H";
        if(fuel <= 0) gameOver();
    }
    raf = requestAnimationFrame(update);
}

function gameOver() {
    gameActive = false;
    document.getElementById("menu-over").style.display = "flex";
    document.getElementById("final-score-val").innerText = Math.floor(score);
    let ranks = JSON.parse(localStorage.getItem('gms_ranks') || "[]");
    ranks.push(Math.floor(score)); ranks.sort((a,b) => b-a);
    localStorage.setItem('gms_ranks', JSON.stringify(ranks.slice(0, 5)));
    loadRanking();
    document.getElementById("btn-revive").style.display = (coins >= 300) ? "block" : "none";
    let m = "🥉 BRONZE";
    if(score >= 6500) m = "🥇 OURO"; else if(score >= 3500) m = "🥈 PRATA";
    document.getElementById("medal-txt").innerText = m;
}
</script>
</body>
</html>
