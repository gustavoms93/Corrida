<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Highway v5</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
color:white;
}

canvas{
display:block;
margin:auto;
background:#333;
}

#menu{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#000;
z-index:10;
}

button{
padding:20px 40px;
font-size:22px;
border:none;
border-radius:40px;
background:#f1c40f;
cursor:pointer;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

#fuelBar{
width:150px;
height:10px;
background:#444;
margin-top:5px;
}

#fuel{
height:10px;
background:#2ecc71;
width:100%;
}

</style>
</head>

<body>

<div id="menu">

<h1>RETRO HIGHWAY v5</h1>

<p>Record: <span id="record">0</span></p>

<button onclick="startGame()">CORRER</button>

<p>Criado por Gustavo Moreira</p>

<a href="https://www.instagram.com/eng.florestalgustavoms" target="_blank">
@eng.florestalgustavoms
</a>

</div>

<div id="ui">

<div id="speed">0 KM/H</div>
<div id="score">0</div>
<div id="coins">🪙 0</div>

<div id="fuelBar">
<div id="fuel"></div>
</div>

</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=400
canvas.height=window.innerHeight

let running=false

let score=0
let speed=8
let coins=0
let fuel=100

let enemies=[]
let items=[]
let rain=[]

let laneWidth=133

let night=false

let explosion=false
let explosionFrame=0

let bonusMsg=""
let bonusTimer=0

let player={
lane:1,
x:170,
y:canvas.height-140,
w:55,
h:90
}

function startGame(){

document.getElementById("menu").style.display="none"

running=true

for(let i=0;i<80;i++){

rain.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height
})

}

loop()

}

function move(dir){

player.lane=Math.max(0,Math.min(2,player.lane+dir))

}

let startX=0

document.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX

})

document.addEventListener("touchmove",e=>{

if(!running)return

let diff=e.touches[0].clientX-startX

if(Math.abs(diff)>40){

if(diff>0)move(1)
else move(-1)

startX=e.touches[0].clientX

}

})

function drawCar(v,color){

ctx.fillStyle=color
ctx.fillRect(v.x,v.y,v.w,v.h)

}

function drawGMSTruck(v){

ctx.save()

ctx.shadowBlur=15
ctx.shadowColor="rgba(0,255,150,0.8)"

ctx.fillStyle="#ecf0f1"
ctx.fillRect(v.x,v.y,v.w,v.h)

ctx.fillStyle="#bdc3c7"
ctx.fillRect(v.x,v.y+v.h-60,v.w,60)

let grad=ctx.createLinearGradient(v.x,v.y,v.x+v.w,v.y+v.h)

grad.addColorStop(0,"#2ecc71")
grad.addColorStop(1,"#3498db")

ctx.fillStyle=grad

ctx.beginPath()

ctx.moveTo(v.x+v.w/2,v.y+40)
ctx.quadraticCurveTo(v.x+v.w+10,v.y+80,v.x+v.w/2,v.y+120)
ctx.quadraticCurveTo(v.x-10,v.y+80,v.x+v.w/2,v.y+40)

ctx.fill()

ctx.restore()

}

function spawnEnemy(){

if(Math.random()<0.01){

let lane=Math.floor(Math.random()*3)

enemies.push({

type:"gms",
lane:lane,
x:lane*laneWidth+40,
y:-200,
w:70,
h:200,
speed:5,
bonus:false

})

return

}

let lane=Math.floor(Math.random()*3)

let r=Math.random()

let type="car"
let h=90

if(r>0.8){

type="truck"
h=180

}

else if(r>0.6){

type="police"

}

enemies.push({

type:type,
lane:lane,
x:lane*laneWidth+40,
y:-150,
w:55,
h:h,
speed:5

})

}

function spawnItem(){

let lane=Math.floor(Math.random()*3)

items.push({

type:Math.random()<0.7?"coin":"fuel",
lane:lane,
x:lane*laneWidth+50,
y:-40

})

}

function drawRain(){

ctx.strokeStyle="rgba(200,200,255,0.5)"

rain.forEach(r=>{

ctx.beginPath()

ctx.moveTo(r.x,r.y)

ctx.lineTo(r.x,r.y+10)

ctx.stroke()

r.y+=15

if(r.y>canvas.height){

r.y=0
r.x=Math.random()*canvas.width

}

})

}

function drawExplosion(x,y){

ctx.fillStyle="orange"

ctx.beginPath()

ctx.arc(x,y,explosionFrame*5,0,Math.PI*2)

ctx.fill()

explosionFrame++

if(explosionFrame>20){

alert("FIM DA LINHA Score:"+Math.floor(score))

location.reload()

}

}

function loop(){

if(!running)return

night=(Math.floor(score/5000)%2!==0)

ctx.fillStyle=night?"#111":"#444"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawRain()

ctx.strokeStyle="white"

ctx.setLineDash([30,30])

ctx.lineDashOffset=-(score*2)

for(let i=1;i<3;i++){

ctx.beginPath()
ctx.moveTo(i*laneWidth,0)
ctx.lineTo(i*laneWidth,canvas.height)
ctx.stroke()

}

let targetX=player.lane*laneWidth+40

player.x+=(targetX-player.x)*0.2

drawCar(player,"red")

if(Math.random()<0.02)spawnEnemy()
if(Math.random()<0.01)spawnItem()

enemies.forEach((e,i)=>{

e.y+=e.speed+(speed*0.2)

if(e.type==="car")drawCar(e,"blue")
if(e.type==="truck")drawCar(e,"gray")
if(e.type==="police")drawCar(e,"black")

if(e.type==="gms"){

drawGMSTruck(e)

let dx=Math.abs(player.x-e.x)
let dy=Math.abs(player.y-e.y)

if(dx<90 && dy<120 && !e.bonus){

coins+=50

bonusMsg="BONUS GMS FLORESTAL +50"

bonusTimer=120

e.bonus=true

}

}

if(

player.x<e.x+e.w &&
player.x+player.w>e.x &&
player.y<e.y+e.h &&
player.y+player.h>e.y &&
e.type!=="gms"

){

explosion=true
running=false

}

if(e.y>canvas.height){

enemies.splice(i,1)

score+=100

}

})

items.forEach((it,i)=>{

it.y+=speed

ctx.fillStyle=it.type==="coin"?"gold":"green"

ctx.beginPath()

ctx.arc(it.x,it.y,10,0,Math.PI*2)

ctx.fill()

if(

player.x<it.x+10 &&
player.x+player.w>it.x &&
player.y<it.y+10 &&
player.y+player.h>it.y

){

if(it.type==="coin")coins+=10
if(it.type==="fuel")fuel=Math.min(100,fuel+30)

items.splice(i,1)

}

})

fuel-=0.02

if(fuel<=0){

alert("Sem combustível!")

location.reload()

}

document.getElementById("fuel").style.width=fuel+"%"

score+=1
speed=8+(score/2000)

document.getElementById("score").innerText=Math.floor(score)
document.getElementById("speed").innerText=Math.floor(speed*15)+" KM/H"
document.getElementById("coins").innerText="🪙 "+coins

if(bonusTimer>0){

ctx.fillStyle="yellow"
ctx.font="bold 28px Arial"
ctx.textAlign="center"

ctx.fillText(bonusMsg,canvas.width/2,canvas.height/2)

bonusTimer--

}

if(explosion){

drawExplosion(player.x+30,player.y+30)

}else{

requestAnimationFrame(loop)

}

}

</script>

</body>
</html>
