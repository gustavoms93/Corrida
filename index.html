<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Highway v6.5 - GMS Elite</title>
    <style>
        :root { --gold: #f1c40f; --gas: #2ecc71; --danger: #e74c3c; }
        body { margin: 0; background: #111; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white; touch-action: none; }
        canvas { display: block; margin: auto; background: #222; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 100; text-align: center; padding: 20px; }
        
        /* Botões Estilizados */
        .btn-main { padding: 18px 45px; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; transition: 0.2s; margin: 10px; text-transform: uppercase; }
        .btn-share { padding: 12px 25px; border-radius: 25px; border: none; font-weight: bold; color: white; margin: 5px; cursor: pointer; min-width: 120px; }
        .whatsapp { background: #25d366; }
        .twitter { background: #1da1f2; }

        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10; width: calc(100% - 30px); display: flex; justify-content: space-between; text-shadow: 2px 2px #000; font-weight: bold; }
        #fuel-wrap { width: 120px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #fuel-fill { height: 100%; background: var(--gas); width: 100%; transition: width 0.3s; }
        
        .new-record { color: var(--gold); font-weight: bold; animation: blink 0.5s infinite; margin: 10px 0; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-main" class="overlay">
        <h1 style="font-size: 42px; color: var(--gold); margin: 0;">HIGHWAY v6.5</h1>
        <p>RECORDE ATUAL: <span id="record-display">0</span></p>
        <button class="btn-main" onclick="initGame()">CORRER AGORA</button>
        <p style="font-size: 14px; opacity: 0.7;">@eng.florestalgustavoms</p>
    </div>

    <div id="menu-over" class="overlay" style="display: none;">
        <h1 style="color: var(--danger); font-size: 32px;">BATIDA DETECTADA!</h1>
        <h2 style="margin: 5px 0;">PONTUAÇÃO: <span id="final-score">0</span></h2>
        <div id="new-record-msg" class="new-record" style="display: none;">NOVO RECORDE!</div>
        
        <p style="margin-top: 30px; font-size: 14px; letter-spacing: 1px;">COMPARTILHAR PONTUAÇÃO:</p>
        <div style="display: flex;">
            <button class="btn-share whatsapp" onclick="share('wa')">WhatsApp</button>
            <button class="btn-share twitter" onclick="share('tw')">Twitter/X</button>
        </div>
        
        <button class="btn-main" style="margin-top: 40px;" onclick="initGame()">TENTAR NOVAMENTE</button>
    </div>

    <div id="ui" style="display: none;">
        <div>
            <div id="km-txt">0 KM/H</div>
            <div id="fuel-wrap"><div id="fuel-fill"></div></div>
            <small style="font-size: 10px; letter-spacing: 1px;">GASOLINA</small>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 20px; color: var(--gold);">🪙 <span id="coin-txt">0</span></div>
            <div id="score-txt">SCORE: 0</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Estados e Variáveis
let gameActive = false;
let score, speed, coins, fuel, enemies, items, rafId;
let player = { lane: 1, x: 0, y: 0, w: 50, h: 85 };
const laneWidth = 140; // Base para cálculo dinâmico

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = window.innerHeight;
    player.y = canvas.height - 150;
}
window.addEventListener('resize', resize);
resize();

function resetGameState() {
    cancelAnimationFrame(rafId);
    score = 0; speed = 8; coins = 0; fuel = 100;
    enemies = []; items = [];
    player.lane = 1;
    player.x = (canvas.width / 3) * 1.5 - 25;
}

function initGame() {
    resetGameState();
    document.getElementById("menu-main").style.display = "none";
    document.getElementById("menu-over").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    gameActive = true;
    update();
}

// Controles Suaves
document.addEventListener("touchstart", e => {
    const touchX = e.touches[0].clientX;
    const third = window.innerWidth / 3;
    if (touchX < third) player.lane = 0;
    else if (touchX < third * 2) player.lane = 1;
    else player.lane = 2;
});

function drawCar(v, color, isPlayer = false) {
    ctx.fillStyle = "rgba(0,0,0,0.3)"; // Sombra
    ctx.fillRect(v.x + 5, v.y + 5, v.w, v.h);
    
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(v.x, v.y, v.w, v.h, 8);
    ctx.fill();

    // Detalhes (Vidros)
    ctx.fillStyle = "#222";
    ctx.fillRect(v.x + 5, v.y + 12, v.w - 10, 20); // Parabrisa
    ctx.fillRect(v.x + 5, v.y + v.h - 20, v.w - 10, 12); // Traseiro
}

function gameOver() {
    gameActive = false;
    const finalScoreValue = Math.floor(score);
    const record = localStorage.getItem("gms_record") || 0;
    
    document.getElementById("ui").style.display = "none";
    document.getElementById("menu-over").style.display = "flex";
    document.getElementById("final-score").innerText = finalScoreValue;

    if (finalScoreValue > record) {
        localStorage.setItem("gms_record", finalScoreValue);
        document.getElementById("new-record-msg").style.display = "block";
    } else {
        document.getElementById("new-record-msg").style.display = "none";
    }
}

function share(platform) {
    const text = `Fiz ${Math.floor(score)} pontos no Retro Highway GMS! Consegue bater meu recorde?`;
    const url = window.location.href;
    if(platform === 'wa') window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text + " " + url)}`);
    else window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`);
}

function update() {
    if (!gameActive) return;

    // Fundo e Estrada
    ctx.fillStyle = "#333";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grama lateral
    ctx.fillStyle = "#1e7a43";
    ctx.fillRect(0, 0, 15, canvas.height);
    ctx.fillRect(canvas.width - 15, 0, 15, canvas.height);

    // Linhas da pista
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.setLineDash([40, 40]);
    ctx.lineDashOffset = -(score * 10);
    for (let i = 1; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo((canvas.width / 3) * i, 0);
        ctx.lineTo((canvas.width / 3) * i, canvas.height);
        ctx.stroke();
    }

    // Suavização do movimento do Player
    let targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - (player.w / 2);
    player.x += (targetX - player.x) * 0.15;
    drawCar(player, "#e74c3c", true);

    // Gerar Inimigos
    if (Math.random() < 0.02) {
        let lane = Math.floor(Math.random() * 3);
        enemies.push({
            x: (lane * (canvas.width / 3)) + (canvas.width / 6) - 25,
            y: -100, w: 50, h: 85,
            speed: 2 + Math.random() * 3,
            color: `hsl(${Math.random() * 360}, 50%, 50%)`
        });
    }

    // Atualizar Inimigos
    enemies.forEach((e, index) => {
        e.y += e.speed + (speed * 0.5);
        drawCar(e, e.color);

        // Colisão (Hitbox um pouco menor que o desenho para ser justo)
        if (player.x < e.x + e.w - 10 && player.x + player.w - 10 > e.x &&
            player.y < e.y + e.h - 10 && player.y + player.h - 10 > e.y) {
            gameOver();
        }

        if (e.y > canvas.height) enemies.splice(index, 1);
    });

    // Gasolina e Score
    fuel -= 0.025;
    score += 0.5;
    speed = 8 + (score / 500);

    if (fuel <= 0) gameOver();

    // UI Update
    document.getElementById("fuel-fill").style.width = fuel + "%";
    document.getElementById("score-txt").innerText = "SCORE: " + Math.floor(score);
    document.getElementById("km-txt").innerText = Math.floor(speed * 15) + " KM/H";
    document.getElementById("coin-txt").innerText = coins;

    rafId = requestAnimationFrame(update);
}

// Carregar recorde inicial
document.getElementById("record-display").innerText = localStorage.getItem("gms_record") || 0;
</script>
</body>
</html>
