<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asphalt Escape v10.7</title>
    <style>
        :root { --gms-green: #1b5e20; --gold: #f1c40f; --danger: #e74c3c; --road: #222; }
        body { margin: 0; background: #111; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white; touch-action: none; user-select: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Ajuste para centralizar e manter aspecto no PC */
        #game-container { position: relative; width: 100%; max-width: 450px; height: 100vh; background: var(--road); overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: 100%; background: var(--road); }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 100; text-align: center; padding: 20px; }
        .btn-main { padding: 18px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; box-shadow: 0 5px 0 #b7950b; text-transform: uppercase; margin: 10px; transition: 0.2s; }
        .btn-main:hover { transform: scale(1.05); }
        
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; display: none; justify-content: space-between; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        .fuel-bar { width: 120px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; border: 1px solid #fff; }
        #fuel-fill { height: 100%; background: #2ecc71; width: 100%; }
        
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 50; }
        .dir-controls { display: flex; gap: 15px; }
        .ctrl-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; opacity: 0.7; cursor: pointer; }
        
        .pedal-btn { width: 80px; height: 110px; background: #444; border: 3px solid #777; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; color: #fff; cursor: pointer; box-shadow: inset 0 0 10px #000; }
        .pedal-btn:active { background: #222; transform: scale(0.95); }

        .gms-msg { position: absolute; top: 20%; width: 100%; text-align: center; font-weight: bold; color: var(--gold); font-size: 24px; display: none; z-index: 100; text-shadow: 2px 2px #000; pointer-events: none; }
        .ranking-list { font-size: 14px; color: var(--gold); list-style: none; padding: 0; margin: 10px 0; }
        .kb-hint { font-size: 10px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="msg-box" class="gms-msg">🔥 EASTER EGG ENCONTRADO! +50 🔥</div>

    <div id="menu-main" class="overlay">
        <h1 style="color: var(--gold); font-size: 42px; margin: 0;">ASPHALT ESCAPE</h1>
        <p style="color: var(--gms-green); font-weight: bold; margin-bottom: 15px;">"Dirija rápido. Desvie. Sobreviva."</p>
        <ul id="ranking-list" class="ranking-list"></ul>
        <button class="btn-main" onclick="initGame()">CORRER AGORA</button>
        <div class="kb-hint">Use as Setas (← →) e Espaço no Notebook</div>
        <div style="font-size: 11px; margin-top: 10px;">@eng.florestalgustavoms | v10.7</div>
    </div>

    <div id="menu-over" class="overlay" style="display: none;">
        <h1 id="medal-txt" style="margin: 0;">🥉 BRONZE</h1>
        <h2 style="font-size: 42px; margin: 10px 0;">PONTOS: <span id="final-score-val">0</span></h2>
        <button id="btn-revive" class="btn-main" onclick="revive()" style="background: #3498db; color: white; box-shadow: 0 5px 0 #2980b9; display: none;">CONTINUAR (300 🪙)</button>
        <button class="btn-main" onclick="shareChallenge()" style="background: var(--gms-green); color: white; box-shadow: 0 5px 0 #0d3d14;">DESAFIAR AMIGOS 🚀</button>
        <button class="btn-main" onclick="initGame()" style="background: #666; color: white; box-shadow: 0 5px 0 #444;">NOVO JOGO</button>
    </div>

    <div id="ui">
        <div>
            <div id="km-txt">0 KM/H</div>
            <div class="fuel-bar"><div id="fuel-fill"></div></div>
        </div>
        <div style="text-align: right;">
            <div style="color: var(--gold); font-size: 24px; font-weight: bold;">🪙 <span id="coin-txt">0</span></div>
            <div id="score-txt" style="font-weight: bold; font-size: 20px;">0</div>
        </div>
    </div>

    <div class="controls" id="game-ctrls" style="display:none">
        <div class="dir-controls">
            <div class="ctrl-btn" onpointerdown="movePlayer(-1)">◀</div>
            <div class="ctrl-btn" onpointerdown="movePlayer(1)">▶</div>
        </div>
        <div class="pedal-btn" id="gas-pedal">
            <span>GO!</span>
            <small>GAS</small>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameActive = false, score = 0, speed = 7, fuel = 100, coins = 0;
let enemies = [], items = [], scenery = [], raf, isAccelerating = false;
let player = { lane: 1, x: 0, y: 0, w: 50, h: 85, targetX: 0 };

function resize() {
    const container = document.getElementById("game-container");
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    player.y = canvas.height - 200;
    updateTargetX();
}
window.addEventListener('resize', resize);
resize();// --- NOVOS CONTROLES DE TOQUE (Mobile) ---

canvas.addEventListener("touchstart", (e) => {
    if(!gameActive) return;
    e.preventDefault(); // Evita scroll acidental
    
    const touchX = e.touches[0].clientX;
    const screenWidth = window.innerWidth;

    // Lógica de Faixas: Divide a tela em 3 partes
    if (touchX < screenWidth / 3) {
        movePlayer(-1); // Toque na esquerda
    } else if (touchX > (screenWidth / 3) * 2) {
        movePlayer(1);  // Toque na direita
    }
    
    // Inicia aceleração ao tocar em qualquer lugar
    isAccelerating = true;
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
    if(!gameActive) return;
    // Para de acelerar quando solta a tela
    isAccelerating = false;
});

// Suporte para movimento contínuo se o usuário deslizar o dedo
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
}, { passive: false });

// --- CONTROLES DE TECLADO (Notebook) ---
window.addEventListener("keydown", (e) => {
    if(!gameActive) return;
    if(e.key === "ArrowLeft") movePlayer(-1);
    if(e.key === "ArrowRight") movePlayer(1);
    if(e.key === " " || e.key === "ArrowUp") isAccelerating = true;
});

window.addEventListener("keyup", (e) => {
    if(e.key === " " || e.key === "ArrowUp") isAccelerating = false;
});

// Eventos do Pedal (Touch/Mouse)
const gasPedal = document.getElementById("gas-pedal");
gasPedal.addEventListener("pointerdown", () => isAccelerating = true);
gasPedal.addEventListener("pointerup", () => isAccelerating = false);
gasPedal.addEventListener("pointerleave", () => isAccelerating = false);

// COMPARTILHAMENTO PERSONALIZADO v10.7
async function shareChallenge() {
    const gameUrl = window.location.href;
    const shareText = `🔥 DESAFIO ASPHALT ESCAPE 🔥\n\nFiz ${Math.floor(score)} pontos na rodovia… 🚗💨\nVocê consegue bater esse recorde? 😏\n\n🎮 JOGUE AGORA:\n${gameUrl}\n\nCriado por @eng.florestalgustavoms`;

    if (navigator.share) {
        try { await navigator.share({ title: 'Asphalt Escape', text: shareText }); } catch (err) {}
    } else {
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`);
    }
}

function revive() {
    if(coins >= 300) {
        coins -= 300; document.getElementById("coin-txt").innerText = coins;
        fuel = 100; enemies = [];
        document.getElementById("menu-over").style.display = "none";
        document.getElementById("ui").style.display = "flex";
        gameActive = true; update();
    }
}

function loadRanking() {
    const ranks = JSON.parse(localStorage.getItem('gms_ranks') || "[]");
    document.getElementById("ranking-list").innerHTML = ranks.slice(0, 5).map((s, i) => `<li>${i+1}º - ${s} pts</li>`).join("");
}
loadRanking();

function updateTargetX() { player.targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - (player.w / 2); }
function movePlayer(dir) { if(!gameActive) return; player.lane = Math.max(0, Math.min(2, player.lane + dir)); updateTargetX(); }

function initGame() {
    score = 0; speed = 7; fuel = 100; coins = 0; enemies = []; items = []; scenery = []; isAccelerating = false;
    player.lane = 1; updateTargetX(); player.x = player.targetX;
    document.getElementById("coin-txt").innerText = "0";
    document.getElementById("menu-main").style.display = "none";
    document.getElementById("menu-over").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    document.getElementById("game-ctrls").style.display = "flex";
    gameActive = true;
    if(raf) cancelAnimationFrame(raf);
    update();
}

function drawVehicle(v) {
    ctx.fillStyle = v.color || "#444";
    ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 8); ctx.fill();
    if(v.isEasterEgg) {
        ctx.fillStyle = "white"; ctx.font = "bold 12px Arial";
        ctx.save(); ctx.translate(v.x+v.w-5, v.y+v.h-15); ctx.rotate(-Math.PI/2);
        ctx.fillText("GMS FLORESTAL", 0, 0); ctx.restore();
    }
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(v.x+8, v.y+10, v.w-16, 22);
}

function update() {
    if(!gameActive) return;
    ctx.fillStyle = "#222"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    if(Math.random() < 0.05) scenery.push({ x: Math.random() < 0.5 ? 5 : canvas.width - 25, y: -50, type: Math.random() > 0.5 ? '🌵' : '🌳' });
    scenery.forEach((s, i) => {
        s.y += speed; ctx.font = "20px Arial"; ctx.fillText(s.type, s.x, s.y);
        if(s.y > canvas.height) scenery.splice(i, 1);
    });

    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.setLineDash([40, 60]);
    ctx.lineDashOffset = -(score * 10);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*(canvas.width/3), 0); ctx.lineTo(i*(canvas.width/3), canvas.height); ctx.stroke();
    }

    player.x += (player.targetX - player.x) * 0.2;
    drawVehicle({...player, color: "#e74c3c"});

    if(Math.random() < 0.03) items.push({ type: Math.random() > 0.8 ? 'gas' : 'coin', x: (Math.floor(Math.random()*3) * (canvas.width/3)) + (canvas.width/6), y: -50 });
    items.forEach((it, i) => {
        it.y += speed; ctx.font = "20px Arial"; ctx.fillText(it.type === 'coin' ? '🪙' : '⛽', it.x-10, it.y);
        if(Math.hypot(player.x+25 - it.x, player.y+40 - it.y) < 40) {
            if(it.type === 'coin') { coins += 10; document.getElementById("coin-txt").innerText = coins; }
            else fuel = Math.min(100, fuel + 35);
            items.splice(i, 1);
        }
    });

    if(Math.random() < 0.02 + (score/100000)) {
        let lane = Math.floor(Math.random()*3);
        let topEnemies = enemies.filter(e => e.y < 350);
        if(!enemies.some(e => e.lane === lane && e.y < 450) && topEnemies.length < 2) {
            let isEE = Math.random() < 0.02;
            enemies.push({
                lane, x: (lane * (canvas.width / 3)) + (canvas.width / 6) - 25,
                y: -200, w: 50, h: isEE ? 160 : 85,
                color: isEE ? "#1b5e20" : "#2980b9", isEasterEgg: isEE, speed: 2 + Math.random()*2, done: false
            });
        }
    }

    enemies.forEach((e, i) => {
        e.y += e.speed + (speed * 0.4); drawVehicle(e);
        if(player.x+10 < e.x+e.w-10 && player.x+player.w-10 > e.x+10 && player.y+10 < e.y+e.h-10 && player.y+player.h-10 > e.y+10) {
            gameActive = false; gameOver();
        }
        if(e.isEasterEgg && e.y > player.y && !e.done) {
            score += 50; e.done = true;
            const msg = document.getElementById("msg-box");
            msg.style.display = "block";
            setTimeout(() => { msg.style.display = "none"; }, 3000);
        }
        if(e.y > canvas.height) enemies.splice(i, 1);
    });

    if(gameActive) {
        let accel = isAccelerating ? 2 : 1;
        score += 1 * accel;
        fuel -= 0.035 * accel;
        speed = (7 + (score/6000)) * (isAccelerating ? 1.4 : 1);

        document.getElementById("fuel-fill").style.width = fuel + "%";
        document.getElementById("score-txt").innerText = Math.floor(score);
        document.getElementById("km-txt").innerText = Math.floor(speed * 15) + " KM/H";
        if(fuel <= 0) { gameActive = false; gameOver(); }
    }
    raf = requestAnimationFrame(update);
}

function gameOver() {
    document.getElementById("menu-over").style.display = "flex";
    document.getElementById("final-score-val").innerText = Math.floor(score);
    let ranks = JSON.parse(localStorage.getItem('gms_ranks') || "[]");
    ranks.push(Math.floor(score)); ranks.sort((a,b) => b-a);
    localStorage.setItem('gms_ranks', JSON.stringify(ranks.slice(0, 10)));
    loadRanking();
    document.getElementById("btn-revive").style.display = (coins >= 300) ? "block" : "none";
}
</script>
</body>
</html>
