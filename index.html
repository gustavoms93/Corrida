<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Highway Elite v3.5</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --danger: #e74c3c; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        canvas { background: #333; flex: 1; width: 100%; max-width: 450px; margin: auto; display: block; }
        
        /* HUD Superior */
        #score-box { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border-left: 4px solid var(--gold); pointer-events: none; }
        
        /* Menus */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        
        button { padding: 15px 35px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; margin: 10px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        .share-btn { background: var(--blue); color: white; font-size: 16px; padding: 10px 20px; }
        .wa-btn { background: #25d366; }

        #touch-area { width: 100%; height: 100px; background: #111; border-top: 2px solid #333; display: flex; align-items: center; justify-content: center; color: #666; font-size: 12px; letter-spacing: 2px; }
        
        .insta { color: var(--blue); text-decoration: none; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-menu" class="overlay">
        <h1 style="color: var(--gold); font-size: 42px; margin-bottom: 0;">ELITE ROAD</h1>
        <p style="margin-bottom: 30px; opacity: 0.7;">v3.5 Professional Edition</p>
        <button onclick="initGame()">INICIAR MOTOR</button>
        <a href="https://www.instagram.com/eng.florestalgustavoms" class="insta" target="_blank">@eng.florestalgustavoms</a>
    </div>

    <div id="game-over-menu" class="overlay" style="display: none;">
        <h2 style="color: var(--danger); font-size: 32px;">BATIDA DETECTADA!</h2>
        <p id="final-score" style="font-size: 24px; margin: 5px 0;"></p>
        <p id="new-record" style="color: var(--gold); font-weight: bold; display: none;">NOVO RECORDE!</p>
        
        <div style="margin: 20px 0;">
            <p style="font-size: 14px; margin-bottom: 10px;">COMPARTILHAR PONTUAÇÃO:</p>
            <button class="share-btn wa-btn" onclick="shareWhatsApp()">WhatsApp</button>
            <button class="share-btn" onclick="shareTwitter()">Twitter/X</button>
        </div>
        
        <button onclick="location.reload()">TENTAR NOVAMENTE</button>
    </div>

    <div id="score-box">
        <div id="km" style="font-size: 12px; opacity: 0.8;">0 KM/H</div>
        <div id="points" style="font-size: 26px; color: var(--gold); font-weight: bold;">0</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="touch-area">◄ DESLIZE PARA CONTROLAR ►</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let gameRunning = false;
let score = 0;
let speed = 8;
let enemies = [];
let particles = [];
const laneWidth = 133;

let player = { lane: 1, x: 170, y: 0, w: 55, h: 95, color: '#e74c3c' };

// --- Áudio (Motor) ---
let audioCtx, osc, gain;
function startMotor() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    osc = audioCtx.createOscillator();
    gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(50, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
}

function initGame() {
    document.getElementById("start-menu").style.display = "none";
    canvas.width = 400;
    canvas.height = window.innerHeight - 100;
    player.y = canvas.height - 160;
    if(!audioCtx) startMotor();
    gameRunning = true;
    requestAnimationFrame(loop);
}

// --- Controles Touch ---
let startTouchX = 0;
document.addEventListener('touchstart', e => startTouchX = e.touches[0].clientX);
document.addEventListener('touchmove', e => {
    if(!gameRunning) return;
    let moveX = e.touches[0].clientX - startTouchX;
    if(Math.abs(moveX) > 35) {
        player.lane = Math.max(0, Math.min(2, player.lane + (moveX > 0 ? 1 : -1)));
        startTouchX = e.touches[0].clientX;
    }
});

// --- Funções Auxiliares ---
function spawnEnemy() {
    let lane = Math.floor(Math.random() * 3);
    if(enemies.some(en => en.lane === lane && en.y < 200)) return;
    
    let isTruck = Math.random() > 0.8;
    enemies.push({
        lane, x: lane * laneWidth + (laneWidth/2 - 27),
        y: -200, w: 55, h: isTruck ? 170 : 95,
        speed: speed * (isTruck ? 0.7 : 0.5),
        color: isTruck ? '#95a5a6' : '#3498db'
    });
}

function drawCar(v, color) {
    ctx.save();
    // Sombra e Corpo
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(v.x+5, v.y+5, v.w, v.h);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 8); ctx.fill();
    // Vidros
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(v.x+8, v.y+15, v.w-16, 25);
    // Luzes
    ctx.fillStyle = color === player.color ? "#f1c40f" : "#c0392b";
    ctx.fillRect(v.x+5, color === player.color ? v.y+v.h-5 : v.y, 12, 4);
    ctx.fillRect(v.x+v.w-17, color === player.color ? v.y+v.h-5 : v.y, 12, 4);
    ctx.restore();
}

// --- Compartilhamento ---
function shareWhatsApp() {
    const text = `Fiz ${Math.floor(score)} pontos no Highway Elite! Consegue bater meu recorde? 🚗💨 ${window.location.href}`;
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
}

function shareTwitter() {
    const text = `Fiz ${Math.floor(score)} pontos no Highway Elite! 🚗💨 #GameDev #RetroHighway`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`);
}

function gameOver() {
    gameRunning = false;
    gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    
    const record = localStorage.getItem("h_record") || 0;
    if(score > record) {
        localStorage.setItem("h_record", Math.floor(score));
        document.getElementById("new-record").style.display = "block";
    }
    
    document.getElementById("final-score").innerText = `PONTUAÇÃO: ${Math.floor(score)}`;
    document.getElementById("game-over-menu").style.display = "flex";
}

// --- Loop Principal ---
function loop() {
    if(!gameRunning) return;

    // Fundo e Estrada
    ctx.fillStyle = "#333"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#27ae60"; ctx.fillRect(0,0,15,canvas.height); ctx.fillRect(canvas.width-15,0,15,canvas.height);
    
    // Faixas
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.setLineDash([30,30]); ctx.lineWidth = 4;
    ctx.lineDashOffset = -(score * 2.5);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*laneWidth,0); ctx.lineTo(i*laneWidth,canvas.height); ctx.stroke();
    }

    // Jogador Suave
    let tx = player.lane * laneWidth + (laneWidth/2 - 27);
    player.x += (tx - player.x) * 0.18;
    drawCar(player, player.color);

    // Inimigos
    if(Math.random() < 0.02) spawnEnemy();
    enemies.forEach((en, i) => {
        en.y += en.speed + (speed * 0.3);
        drawCar(en, en.color);
        
        if(player.x < en.x+en.w-8 && player.x+player.w-8 > en.x && player.y < en.y+en.h-8 && player.y+player.h-8 > en.y) {
            gameOver();
        }
        if(en.y > canvas.height) { enemies.splice(i,1); score += 100; }
    });

    score += 1;
    speed = 8 + (score / 2500);
    osc.frequency.setTargetAtTime(50 + (speed * 4), audioCtx.currentTime, 0.1);
    
    document.getElementById("points").innerText = Math.floor(score);
    document.getElementById("km").innerText = Math.floor(speed * 18) + " KM/H";
    
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
