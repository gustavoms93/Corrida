<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asphalt Escape v10.1</title>
    <style>
        :root { --gold: #f1c40f; --gms-green: #1b5e20; --danger: #e74c3c; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white; touch-action: none; user-select: none; }
        canvas { display: block; margin: auto; background: #222; }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; padding: 20px; }
        .btn-main { padding: 18px 45px; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; box-shadow: 0 5px 0 #b7950b; text-transform: uppercase; margin: 10px; }
        
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; display: none; justify-content: space-between; z-index: 10; pointer-events: none; }
        .fuel-bar { width: 120px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; border: 1px solid #fff; }
        #fuel-fill { height: 100%; background: #2ecc71; width: 100%; }
        
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; }
        .ctrl-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; }
        
        .gms-banner { position: absolute; top: 20%; width: 100%; text-align: center; color: var(--gold); font-weight: bold; font-size: 24px; display: none; z-index: 100; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="msg-box" class="gms-banner">EASTER EGG ENCONTRADO!</div>

<div id="menu-main" class="overlay">
    <h1 style="color: var(--gold); font-size: 42px; margin: 0;">ASPHALT ESCAPE</h1>
    <p style="color: #2ecc71; font-weight: bold;">"Dirija rápido. Desvie. Sobreviva."</p>
    
    <button class="btn-main" onclick="initGame()">CORRER AGORA</button>
    
    <div style="font-size: 13px; margin-top: 20px; line-height: 1.6;">
        Criado por <b>Gustavo Moreira</b><br>
        Eng. Florestal e fundador da GMS Florestal<br>
        <a href="https://www.instagram.com/eng.florestalgustavoms" target="_blank" style="color: var(--gold); text-decoration: none;">@eng.florestalgustavoms</a>
    </div>
    <div style="position: absolute; bottom: 10px; opacity: 0.3; font-size: 10px;">v10.1</div>
</div>

<div id="menu-over" class="overlay" style="display: none;">
    <h1 id="medal-txt" style="color: var(--gold);">🥈 PRATA</h1>
    <h2 style="font-size: 48px; margin: 10px 0;"><span id="final-score">0</span></h2>
    
    <button class="btn-main" onclick="shareChallenge()" style="background: #1b5e20; color: white; box-shadow: 0 5px 0 #0a3d14;">DESAFIAR AMIGOS</button>
    <button class="btn-main" onclick="initGame()">TENTAR NOVAMENTE</button>
    
    <div style="margin-top: 15px;">
        <button onclick="shareWA()" style="background:#25d366; color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">WhatsApp</button>
    </div>
</div>

<div id="ui">
    <div>
        <div id="km-txt" style="font-weight: bold;">0 KM/H</div>
        <div class="fuel-bar"><div id="fuel-fill"></div></div>
    </div>
    <div style="text-align: right;">
        <div style="color: var(--gold); font-size: 20px;">🪙 <span id="coin-txt">0</span></div>
        <div id="score-txt" style="font-weight: bold;">0</div>
    </div>
</div>

<div class="controls" id="game-ctrls" style="display:none">
    <div class="ctrl-btn" onpointerdown="movePlayer(-1)">◀</div>
    <div class="ctrl-btn" onpointerdown="movePlayer(1)">▶</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameActive = false, score = 0, speed = 7, fuel = 100, coins = 0;
let enemies = [], items = [], particles = [], raf;
let player = { lane: 1, x: 0, y: 0, w: 50, h: 85, targetX: 0 };

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = window.innerHeight;
    player.y = canvas.height - 180;
    updateTargetX();
}
window.addEventListener('resize', resize);
resize();

function updateTargetX() { player.targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - (player.w / 2); }
function movePlayer(dir) { if(!gameActive) return; player.lane = Math.max(0, Math.min(2, player.lane + dir)); updateTargetX(); }

function initGame() {
    score = 0; speed = 7; fuel = 100; coins = 0; enemies = []; items = []; particles = [];
    player.lane = 1; updateTargetX(); player.x = player.targetX;
    
    document.getElementById("menu-main").style.display = "none";
    document.getElementById("menu-over").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    document.getElementById("game-ctrls").style.display = "flex";
    
    gameActive = true;
    if(raf) cancelAnimationFrame(raf);
    update();
}

function drawVehicle(v) {
    ctx.fillStyle = v.color || "#444";
    ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 8); ctx.fill();
    
    if(v.type === 'truck') {
        ctx.fillStyle = "white"; ctx.font = "bold 10px Arial";
        ctx.save(); ctx.translate(v.x+v.w-5, v.y+v.h-15); ctx.rotate(-Math.PI/2);
        ctx.fillText("GMS FLORESTAL", 0, 0); ctx.restore();
    }
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(v.x+8, v.y+10, v.w-16, 20);
}

function update() {
    if(!gameActive) return;

    ctx.fillStyle = "#222"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Estrada
    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.setLineDash([40, 60]);
    ctx.lineDashOffset = -(score * 10);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*(canvas.width/3), 0); ctx.lineTo(i*(canvas.width/3), canvas.height); ctx.stroke();
    }

    // Player
    player.x += (player.targetX - player.x) * 0.2;
    drawVehicle({...player, color: "#e74c3c"});

    // Spawn de Itens (Moedas e Gasolina)
    if(Math.random() < 0.02) {
        let lane = Math.floor(Math.random()*3);
        items.push({ type: Math.random() > 0.8 ? '⛽' : '🪙', x: (lane * (canvas.width/3)) + (canvas.width/6), y: -50 });
    }
    
    items.forEach((it, i) => {
        it.y += speed;
        ctx.font = "20px Arial";
        ctx.fillText(it.type, it.x-10, it.y);
        if(Math.hypot(player.x+25 - it.x, player.y+40 - it.y) < 40) {
            if(it.type === '🪙') coins += 10; else fuel = Math.min(100, fuel + 30);
            items.splice(i, 1);
        }
    });

    // Spawn de Inimigos (Correção de sobreposição)
    if(Math.random() < 0.02) {
        let lane = Math.floor(Math.random()*3);
        if(!enemies.some(e => e.lane === lane && e.y < 300)) {
            let isGMS = Math.random() < 0.05;
            enemies.push({
                lane, x: (lane * (canvas.width/3)) + (canvas.width/6) - 25,
                y: -150, w: 50, h: isGMS ? 150 : 85,
                color: isGMS ? "#1b5e20" : "#2980b9",
                type: isGMS ? 'truck' : 'car',
                isGMS, speed: 2 + Math.random()*2
            });
        }
    }

    enemies.forEach((e, i) => {
        e.y += e.speed + (speed * 0.4);
        drawVehicle(e);
        if(player.x+5 < e.x+e.w-5 && player.x+player.w-5 > e.x+5 && player.y+5 < e.y+e.h-5 && player.y+player.h-5 > e.y+5) {
            gameOver();
        }
        if(e.isGMS && e.y > player.y && !e.bonus) {
            score += 500; e.bonus = true;
            document.getElementById("msg-box").style.display = "block";
            setTimeout(() => document.getElementById("msg-box").style.display = "none", 2000);
        }
        if(e.y > canvas.height) enemies.splice(i, 1);
    });

    score += 1; fuel -= 0.04;
    speed = 7 + (score/4000);
    
    document.getElementById("fuel-fill").style.width = fuel + "%";
    document.getElementById("score-txt").innerText = Math.floor(score + (coins * 10));
    document.getElementById("km-txt").innerText = Math.floor(speed * 15) + " KM/H";
    document.getElementById("coin-txt").innerText = coins;

    if(fuel <= 0) gameOver();
    raf = requestAnimationFrame(update);
}

function gameOver() {
    gameActive = false;
    document.getElementById("menu-over").style.display = "flex";
    const total = Math.floor(score + (coins * 10));
    document.getElementById("final-score").innerText = total;
    
    let m = "🥉 BRONZE";
    if(total >= 6000) m = "👑 LENDA";
    else if(total >= 3000) m = "🥇 OURO";
    else if(total >= 1000) m = "🥈 PRATA";
    document.getElementById("medal-txt").innerText = m;
}

function shareWA() {
    const total = document.getElementById("final-score").innerText;
    const msg = `Fiz ${total} pontos no Asphalt Escape! 🚗🔥\nConsegue bater meu recorde?\n\nJogue aqui: ${window.location.href}`;
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
}

function shareChallenge() {
    const total = document.getElementById("final-score").innerText;
    const msg = `Desafio você a bater minha pontuação de ${total} no Asphalt Escape! 🏁`;
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
}
</script>
</body>
</html>
