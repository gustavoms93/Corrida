<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GMS Highway v8.0</title>
    <style>
        :root { --gold: #f1c40f; --gas: #2ecc71; --danger: #e74c3c; --gms: #1b5e20; }
        body { margin: 0; background: #111; font-family: sans-serif; overflow: hidden; color: white; touch-action: none; }
        canvas { display: block; margin: auto; background: #333; }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; }
        .btn { padding: 15px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; margin: 10px; box-shadow: 0 4px 0 #b7950b; }
        .whatsapp { background: #25d366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 20px; font-weight: bold; }
        
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: none; justify-content: space-between; pointer-events: none; z-index: 10; text-shadow: 2px 2px #000; }
        #fuel-bar { width: 100px; height: 10px; background: #444; border: 1px solid #fff; border-radius: 5px; }
        #fuel-fill { height: 100%; background: var(--gas); width: 100%; }
    </style>
</head>
<body>

<div id="menu-main" class="overlay">
    <h1 style="color: var(--gold); font-size: 40px; margin-bottom: 10px;">GMS HIGHWAY</h1>
    <p>RECORDE: <span id="record">0</span></p>
    <button class="btn" onclick="startGame()">CORRER AGORA</button>
    <p style="font-size: 12px; opacity: 0.6;">Deslize para os lados para desviar</p>
</div>

<div id="menu-over" class="overlay" style="display: none;">
    <h1 style="color: var(--danger);">BATIDA DETECTADA!</h1>
    <h2 id="final-score">SCORE: 0</h2>
    <a href="#" id="wa-link" class="whatsapp" target="_blank">COMPARTILHAR NO WHATSAPP</a>
    <button class="btn" onclick="startGame()" style="margin-top: 20px;">TENTAR NOVAMENTE</button>
</div>

<div id="ui">
    <div>
        <div id="km">0 KM/H</div>
        <div id="fuel-bar"><div id="fuel-fill"></div></div>
    </div>
    <div style="text-align: right;">
        <div style="color: var(--gold);">🪙 <span id="coins">0</span></div>
        <div id="score">0</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let raf, gameActive = false;
let score, speed, fuel, coins, enemies, player;

// Configuração do Player
player = { lane: 1, x: 0, y: 0, w: 50, h: 80, color: "#e74c3c" };

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = window.innerHeight;
    player.y = canvas.height - 140;
}
window.addEventListener('resize', resize);
resize();

// --- CONTROLES DE DESLIZE (SWIPE) ---
let startX = 0;
document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
document.addEventListener("touchmove", e => {
    if(!gameActive) return;
    let diff = e.touches[0].clientX - startX;
    if(Math.abs(diff) > 35) { // Sensibilidade alta
        if(diff > 0 && player.lane < 2) player.lane++;
        else if(diff < 0 && player.lane > 0) player.lane--;
        startX = e.touches[0].clientX;
    }
}, {passive: false});

function drawCar(v) {
    ctx.save();
    // Sombra
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(v.x+5, v.y+5, v.w, v.h);
    
    // Corpo
    ctx.fillStyle = v.color;
    ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 8); ctx.fill();
    
    // Vidro
    ctx.fillStyle = "#111";
    ctx.fillRect(v.x+8, v.y+10, v.w-16, 18);

    // Texto GMS FLORESTAL no Caminhão
    if(v.type === 'truck') {
        ctx.fillStyle = "white";
        ctx.font = "bold 10px Arial";
        ctx.save();
        ctx.translate(v.x + 15, v.y + v.h - 10);
        ctx.rotate(-Math.PI/2);
        ctx.fillText("GMS FLORESTAL", 0, 0);
        ctx.restore();
        
        // Carga de madeira (linhas castanhas)
        ctx.fillStyle = "#5d4037";
        for(let i=0; i<3; i++) ctx.fillRect(v.x+10+(i*15), v.y+35, 10, v.h-50);
    }
    ctx.restore();
}

function startGame() {
    // Reset total das variáveis
    score = 0; speed = 7; fuel = 100; coins = 0; enemies = [];
    player.lane = 1;
    gameActive = true;
    
    document.getElementById("menu-main").style.display = "none";
    document.getElementById("menu-over").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    
    if(raf) cancelAnimationFrame(raf);
    update();
}

function update() {
    if(!gameActive) return;

    // Fundo
    ctx.fillStyle = "#333";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Linhas da estrada
    ctx.strokeStyle = "white"; ctx.setLineDash([30, 30]); ctx.lineDashOffset = -(score*10);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*(canvas.width/3), 0); ctx.lineTo(i*(canvas.width/3), canvas.height); ctx.stroke();
    }

    // Movimento do Player
    let tx = (player.lane * (canvas.width/3)) + (canvas.width/6) - (player.w/2);
    player.x += (tx - player.x) * 0.2;
    drawCar({...player, type: 'player'});

    // Spawn
    if(Math.random() < 0.02) {
        let lane = Math.floor(Math.random()*3);
        let isTruck = Math.random() > 0.7;
        enemies.push({
            lane, x: (lane * (canvas.width/3)) + (canvas.width/6) - 25,
            y: -150, w: 50, h: isTruck ? 150 : 80,
            type: isTruck ? 'truck' : 'car',
            color: isTruck ? "#1b5e20" : "#2980b9",
            speed: 2 + Math.random()*3
        });
    }

    enemies.forEach((e, i) => {
        e.y += e.speed + (speed * 0.4);
        drawCar(e);
        
        // Colisão
        if(player.x < e.x+e.w-5 && player.x+player.w-5 > e.x && player.y < e.y+e.h-5 && player.y+player.h-5 > e.y) {
            endGame();
        }
        if(e.y > canvas.height) { enemies.splice(i, 1); score += 10; }
    });

    score += 0.2; fuel -= 0.03;
    speed += 0.001;

    document.getElementById("fuel-fill").style.width = fuel + "%";
    document.getElementById("score").innerText = Math.floor(score);
    document.getElementById("km").innerText = Math.floor(speed * 18) + " KM/H";
    document.getElementById("coins").innerText = coins;

    if(fuel <= 0) endGame();
    raf = requestAnimationFrame(update);
}

function endGame() {
    gameActive = false;
    document.getElementById("menu-over").style.display = "flex";
    document.getElementById("final-score").innerText = "SCORE: " + Math.floor(score);
    
    // Atualizar Recorde
    let rec = localStorage.getItem("gms_rec") || 0;
    if(score > rec) localStorage.setItem("gms_rec", Math.floor(score));
    document.getElementById("record").innerText = localStorage.getItem("gms_rec");

    // Link do WhatsApp
    const msg = `Fiz ${Math.floor(score)} pontos no GMS Highway! @eng.florestalgustavoms`;
    document.getElementById("wa-link").href = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
}

document.getElementById("record").innerText = localStorage.getItem("gms_rec") || 0;
</script>
</body>
</html>
