<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Highway v7.5 - GMS Elite</title>
    <style>
        :root { --gold: #f1c40f; --gas: #2ecc71; --danger: #e74c3c; --gms-green: #1b5e20; }
        body { margin: 0; background: #111; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white; touch-action: none; user-select: none; }
        canvas { display: block; margin: auto; background: #3d3d3d; }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 100; text-align: center; padding: 20px; }
        .btn-main { padding: 18px 45px; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; margin: 10px; text-transform: uppercase; box-shadow: 0 4px 0 #b7950b; }
        .btn-share { padding: 12px 25px; border-radius: 25px; border: none; font-weight: bold; color: white; margin: 5px; cursor: pointer; min-width: 120px; }
        .whatsapp { background: #25d366; }
        
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10; width: calc(100% - 30px); display: flex; justify-content: space-between; text-shadow: 2px 2px #000; }
        #fuel-wrap { width: 120px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; margin-top: 5px; border: 1px solid rgba(255,255,255,0.3); }
        #fuel-fill { height: 100%; background: var(--gas); width: 100%; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-main" class="overlay">
        <h1 style="font-size: 42px; color: var(--gold); margin: 0;">GMS HIGHWAY 7.5</h1>
        <p>RECORDE: <span id="record-display">0</span></p>
        <button class="btn-main" onclick="initGame()">CORRER AGORA</button>
        <p style="font-size: 14px; opacity: 0.7;">Arraste para os lados para desviar!</p>
    </div>

    <div id="menu-over" class="overlay" style="display: none;">
        <h1 style="color: var(--danger); font-size: 32px;">BATIDA DETECTADA!</h1>
        <h2 style="margin: 5px 0;">SCORE: <span id="final-score">0</span></h2>
        <button class="btn-share whatsapp" onclick="share()">WhatsApp</button>
        <button class="btn-main" style="margin-top: 20px;" onclick="initGame()">TENTAR NOVAMENTE</button>
    </div>

    <div id="ui" style="display: none;">
        <div>
            <div id="km-txt">0 KM/H</div>
            <div id="fuel-wrap"><div id="fuel-fill"></div></div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 20px; color: var(--gold);">🪙 <span id="coin-txt">0</span></div>
            <div id="score-txt">0</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameActive = false, score, speed, coins, fuel, enemies, items, rafId;
let player = { lane: 1, x: 0, y: 0, w: 50, h: 85 };

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = window.innerHeight;
    player.y = canvas.height - 150;
}
window.addEventListener('resize', resize);
resize();

// --- CONTROLE POR DESLIZE (SWIPE) ---
let touchStartX = 0;
document.addEventListener("touchstart", e => touchStartX = e.touches[0].clientX);
document.addEventListener("touchmove", e => {
    if (!gameActive) return;
    let touchX = e.touches[0].clientX;
    let diff = touchX - touchStartX;

    if (Math.abs(diff) > 40) { // Sensibilidade do deslize
        if (diff > 0 && player.lane < 2) player.lane++;
        else if (diff < 0 && player.lane > 0) player.lane--;
        touchStartX = touchX; // Reseta para permitir múltiplos deslizes
    }
}, {passive: false});

function drawVehicle(v) {
    ctx.save();
    ctx.fillStyle = v.color || "#444";
    ctx.beginPath();
    ctx.roundRect(v.x, v.y, v.w, v.h, 8);
    ctx.fill();

    // Vidros
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(v.x + 5, v.y + 10, v.w - 10, 20);

    // Texto GMS FLORESTAL no Caminhão
    if (v.type === 'truck') {
        ctx.save();
        ctx.translate(v.x + v.w - 5, v.y + v.h - 10);
        ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = "white";
        ctx.font = "bold 11px Arial";
        ctx.fillText("GMS FLORESTAL", 5, 0);
        ctx.restore();
        
        // Detalhe da Carga
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.lineWidth = 2;
        ctx.strokeRect(v.x+5, v.y+40, v.w-10, v.h-50);
    }
    ctx.restore();
}

function initGame() {
    cancelAnimationFrame(rafId);
    score = 0; speed = 8; coins = 0; fuel = 100; enemies = []; items = [];
    player.lane = 1;
    document.getElementById("menu-main").style.display = "none";
    document.getElementById("menu-over").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    gameActive = true;
    update();
}

function update() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Estrada e Faixas
    ctx.fillStyle = "#3d3d3d"; ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.strokeStyle = "white"; ctx.setLineDash([30, 30]); ctx.lineDashOffset = -(score*10);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*(canvas.width/3), 0); ctx.lineTo(i*(canvas.width/3), canvas.height); ctx.stroke();
    }

    // Suavização do Player
    let targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - (player.w / 2);
    player.x += (targetX - player.x) * 0.2;
    drawVehicle({...player, color: "#e74c3c", type: 'player'});

    // Spawn de Inimigos
    if (Math.random() < 0.03) {
        let lane = Math.floor(Math.random() * 3);
        let isTruck = Math.random() > 0.7;
        enemies.push({
            x: (lane * (canvas.width / 3)) + (canvas.width / 6) - 30,
            y: -200, w: 60, h: isTruck ? 160 : 90,
            type: isTruck ? 'truck' : 'car',
            color: isTruck ? var(--gms-green) : "#2980b9",
            speed: 2 + Math.random() * 2
        });
    }

    enemies.forEach((e, i) => {
        e.y += e.speed + (speed * 0.5);
        drawVehicle(e);
        // Colisão
        if (player.x < e.x + e.w - 5 && player.x + player.w - 5 > e.x && player.y < e.y + e.h - 5 && player.y + player.h - 5 > e.y) {
            gameActive = false;
            document.getElementById("menu-over").style.display = "flex";
            document.getElementById("final-score").innerText = Math.floor(score);
        }
        if (e.y > canvas.height) enemies.splice(i, 1);
    });

    score += 0.5; fuel -= 0.03;
    document.getElementById("fuel-fill").style.width = fuel + "%";
    document.getElementById("score-txt").innerText = Math.floor(score);
    document.getElementById("km-txt").innerText = Math.floor(speed * 15) + " KM/H";

    if(fuel <= 0) { gameActive = false; alert("PANE SECA!"); initGame(); }
    rafId = requestAnimationFrame(update);
}

function share() {
    const text = `Fiz ${Math.floor(score)} pontos no GMS Highway! Consegue superar?`;
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
}
</script>
</body>
</html>
