<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Highway - v1.1</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background: #1a252f; 
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        #game-area {
            position: relative;
            flex: 1; /* Ocupa o máximo de espaço possível */
            background: #4a4a4a;
            display: flex;
            justify-content: center;
        }

        canvas { 
            height: 100%;
            width: auto;
            display: block;
        }

        #score { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            font-size: 18px; 
            color: white;
            background: rgba(0,0,0,0.8); 
            padding: 5px 12px; 
            border: 2px solid #f1c40f;
            border-radius: 5px;
            z-index: 10;
        }

        /* Painel de Controles */
        #ui-panel {
            background: #1a252f;
            padding: 10px;
            border-top: 3px solid #f1c40f;
        }

        #controls {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .btn-control {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            border: 4px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Rodapé Ajustado */
        #footer {
            text-align: center;
            font-size: 11px;
            color: #bdc3c7;
            margin-top: 8px;
            padding-bottom: 5px;
        }

        #footer a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="score">SCORE: 0</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="ui-panel">
        <div id="controls">
            <div class="btn-control" id="btn-left">←</div>
            <div class="btn-control" id="btn-right">→</div>
        </div>
        <div id="footer">
            v1.1 | Criado por: 
            <a href="https://www.instagram.com/eng.florestalgustavoms?igsh=MTRqOHE0ZjcyOXdkMg==" target="_blank">
                @eng.florestalgustavoms
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Ajuste de resolução
        canvas.width = 400;
        canvas.height = 600;

        let gameActive = true;
        let score = 0;
        let roadOffset = 0;
        const laneWidth = canvas.width / 3;

        const player = { lane: 1, x: 170, y: 480, w: 60, h: 90, color: '#e74c3c' };
        let enemies = [];

        // Controles
        function move(dir) {
            player.lane = Math.max(0, Math.min(2, player.lane + dir));
        }

        document.getElementById('btn-left').onclick = (e) => { e.preventDefault(); move(-1); };
        document.getElementById('btn-right').onclick = (e) => { e.preventDefault(); move(1); };
        window.onkeydown = (e) => {
            if(e.key === "ArrowLeft") move(-1);
            if(e.key === "ArrowRight") move(1);
        };

        function spawnEnemy() {
            const lane = Math.floor(Math.random() * 3);
            enemies.push({
                x: lane * laneWidth + (laneWidth/2 - 30),
                y: -100,
                w: 60,
                h: 90,
                speed: 5 + (score/1000),
                color: '#2ecc71'
            });
        }

        function drawCar(car) {
            ctx.fillStyle = car.color;
            ctx.fillRect(car.x, car.y, car.w, car.h);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(car.x + 10, car.y + 15, car.w - 20, 25);
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(car.x+5, car.y+car.h-8, 10, 5);
            ctx.fillRect(car.x+car.w-15, car.y+car.h-8, 10, 5);
        }

        function loop() {
            if(!gameActive) return;

            // Limpar e desenhar estrada
            ctx.fillStyle = "#4a4a4a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Faixas
            roadOffset = (roadOffset + 8) % 60;
            ctx.strokeStyle = "white";
            ctx.setLineDash([30, 30]);
            ctx.lineDashOffset = -roadOffset;
            for(let i=1; i<3; i++) {
                ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, canvas.height); ctx.stroke();
            }

            // Jogador
            let targetX = player.lane * laneWidth + (laneWidth/2 - 30);
            player.x += (targetX - player.x) * 0.2;
            drawCar(player);

            // Inimigos
            if(Math.random() < 0.02) spawnEnemy();
            enemies.forEach((en, i) => {
                en.y += en.speed;
                drawCar(en);
                
                // Colisão
                if(player.x < en.x+en.w && player.x+player.w > en.x && player.y < en.y+en.h && player.y+player.h > en.y) {
                    gameActive = false;
                    alert("Fim de jogo! Pontos: " + Math.floor(score));
                    location.reload();
                }
                if(en.y > canvas.height) { enemies.splice(i, 1); score += 100; }
            });

            score += 1;
            document.getElementById('score').innerText = "SCORE: " + Math.floor(score);
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
