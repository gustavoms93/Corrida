<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Highway v2.0</title>

<style>
body{
margin:0;
background:#1a252f;
font-family:Arial;
color:white;
overflow:hidden;
text-align:center;
}

canvas{
background:#444;
display:block;
margin:auto;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:8px;
background:#f1c40f;
cursor:pointer;
}

#score{
position:absolute;
top:10px;
right:10px;
font-size:20px;
background:#000;
padding:10px;
border-radius:6px;
}

#credits{
position:absolute;
bottom:10px;
width:100%;
font-size:14px;
color:#ccc;
}

#credits a{
color:#3498db;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div id="menu">
<h1>🎮 Retro Highway v2.0</h1>

<p>Recorde: <span id="record">0</span></p>

<button onclick="startGame()">▶ INICIAR</button>

<br><br>

<p>
Criado por<br>
<strong>Gustavo Moreira</strong><br><br>

Instagram<br>

<a href="https://www.instagram.com/eng.florestalgustavoms?igsh=MTRqOHE0ZjcyOXdkMg==" target="_blank">
@eng.florestalgustavoms
</a>

</p>
</div>

<div id="score">0</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<div id="credits">
Retro Highway v2.0
</div>

<script>

const canvas=document.getElementById("gameCanvas")
const ctx=canvas.getContext("2d")

let gameRunning=false
let score=0
let record=localStorage.getItem("record")||0

document.getElementById("record").innerText=record

let laneWidth=canvas.width/3

let player={
lane:1,
x:170,
y:470,
w:55,
h:90
}

let enemies=[]

let roadOffset=0

let level=1

function startGame(){

document.getElementById("menu").style.display="none"

score=0
enemies=[]
gameRunning=true

loop()

}

function move(dir){

player.lane=Math.max(0,Math.min(2,player.lane+dir))

}

window.onkeydown=e=>{
if(e.key==="ArrowLeft")move(-1)
if(e.key==="ArrowRight")move(1)
}

function spawnEnemy(){

let lane=Math.floor(Math.random()*3)

enemies.push({

lane:lane,
x:lane*laneWidth+(laneWidth/2-27),
y:-120,
w:55,
h:90,
speed:4+level

})

}

function drawCar(v,color){

ctx.fillStyle=color
ctx.fillRect(v.x,v.y,v.w,v.h)

ctx.fillStyle="black"
ctx.fillRect(v.x-2,v.y+10,5,20)
ctx.fillRect(v.x+v.w-3,v.y+10,5,20)
ctx.fillRect(v.x-2,v.y+v.h-30,5,20)
ctx.fillRect(v.x+v.w-3,v.y+v.h-30,5,20)

}

function explosion(x,y){

ctx.fillStyle="orange"

for(let i=0;i<10;i++){

ctx.beginPath()
ctx.arc(x+Math.random()*60,y+Math.random()*60,10,0,Math.PI*2)
ctx.fill()

}

}

function loop(){

if(!gameRunning)return

ctx.fillStyle="#555"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#27ae60"
ctx.fillRect(0,0,10,canvas.height)
ctx.fillRect(canvas.width-10,0,10,canvas.height)

roadOffset=(roadOffset+5)%40

ctx.strokeStyle="white"
ctx.setLineDash([20,20])
ctx.lineDashOffset=-roadOffset

for(let i=1;i<3;i++){

ctx.beginPath()
ctx.moveTo(i*laneWidth,0)
ctx.lineTo(i*laneWidth,canvas.height)
ctx.stroke()

}

let targetX=player.lane*laneWidth+(laneWidth/2-27)
player.x+=((targetX-player.x)*0.2)

drawCar(player,"red")

if(Math.random()<0.03)spawnEnemy()

enemies.forEach((e,i)=>{

e.y+=e.speed

drawCar(e,"blue")

if(player.x<e.x+e.w &&
player.x+player.w>e.x &&
player.y<e.y+e.h &&
player.h+player.y>e.y){

explosion(e.x,e.y)

gameRunning=false

setTimeout(()=>{

if(score>record){

localStorage.setItem("record",Math.floor(score))

}

alert("GAME OVER\nPontos: "+Math.floor(score))

location.reload()

},500)

}

if(e.y>canvas.height){

enemies.splice(i,1)
score+=100

}

})

score+=0.5

if(score>2000)level=2
if(score>5000)level=3
if(score>8000)level=4

document.getElementById("score").innerText="Score: "+Math.floor(score)

requestAnimationFrame(loop)

}

</script>

</body>
</html>
