<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asphalt Escape v10.2 - GMS Elite</title>
    <style>
        :root { --gms-green: #1b5e20; --gold: #f1c40f; --danger: #e74c3c; --road: #222; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white; touch-action: none; user-select: none; }
        canvas { display: block; margin: auto; background: var(--road); }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; padding: 20px; }
        .btn-main { padding: 18px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; box-shadow: 0 5px 0 #b7950b; text-transform: uppercase; margin: 10px; transition: 0.1s; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #b7950b; }
        
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; display: none; justify-content: space-between; z-index: 10; pointer-events: none; }
        .fuel-bar { width: 120px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; border: 1px solid #fff; }
        #fuel-fill { height: 100%; background: #2ecc71; width: 100%; }
        
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; }
        .ctrl-btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; opacity: 0.7; }

        .gms-msg { position: absolute; top: 20%; width: 100%; text-align: center; font-weight: bold; color: var(--gold); font-size: 24px; animation: pop 1s; display: none; z-index: 100; text-shadow: 2px 2px #000; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1.2); } }
        .credits { font-size: 11px; margin-top: 15px; opacity: 0.8; line-height: 1.4; }
        .ranking-list { font-size: 14px; color: var(--gold); list-style: none; padding: 0; margin: 5px 0; }
    </style>
</head>
<body>

<div id="msg-box" class="gms-msg">EASTER EGG ENCONTRADO!</div>

<div id="menu-main" class="overlay">
    <h1 style="color: var(--gold); font-size: 42px; margin: 0;">ASPHALT ESCAPE</h1>
    <p style="color: var(--gms-green); font-weight: bold; margin-bottom: 15px;">"Dirija rápido. Desvie. Sobreviva."</p>
    
    <div id="ranking-container">
        <p style="margin: 0; font-size: 12px; opacity: 0.7;">TOP 5 RECORDES:</p>
        <ul id="ranking-list" class="ranking-list"></ul>
    </div>

    <button class="btn-main" onclick="initGame()">CORRER AGORA</button>
    <div class="credits">Criado por <b>Gustavo Moreira</b> | GMS Florestal</div>
    <div style="position: absolute; bottom: 10px; opacity: 0.4; font-size: 10px;">v10.2 (Anti-Paredão & Revive)</div>
</div>

<div id="menu-over" class="overlay" style="display: none;">
    <h1 id="medal-txt" style="margin: 0;">🥈 PRATA</h1>
    <h2 style="font-size: 42px; margin: 10px 0;">PONTOS: <span id="final-score-val">0</span></h2>
    
    <button id="btn-revive" class="btn-main" onclick="revive()" style="background: #3498db; color: white; box-shadow: 0 5px 0 #2980b9; display: none;">
        CONTINUAR (300 🪙)
    </button>

    <button class="btn-main" onclick="shareChallenge()" style="background: var(--gms-green); color: white; box-shadow: 0 5px 0 #0d3d14; font-size: 16px;">
        DESAFIAR AMIGOS 🚀
    </button>
    
    <button class="btn-main" onclick="initGame()" style="font-size: 16px; background: #666; color: white; box-shadow: 0 5px 0 #444;">NOVO JOGO</button>
</div>

<div id="ui">
    <div>
        <div id="km-txt">0 KM/H</div>
        <div class="fuel-bar"><div id="fuel-fill"></div></div>
    </div>
    <div style="text-align: right;">
        <div style="color: var(--gold); font-size: 24px; font-weight: bold;">🪙 <span id="coin-txt">0</span></div>
        <div id="score-txt" style="font-weight: bold; font-size: 20px;">0</div>
    </div>
</div>

<div class="controls" id="game-ctrls" style="display:none">
    <div class="ctrl-btn" onpointerdown="movePlayer(-1)">◀</div>
    <div class="ctrl-btn" onpointerdown="movePlayer(1)">▶</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameActive = false, score = 0, speed = 7, fuel = 100, coins = 0;
let enemies = [], items = [], scenery = [], particles = [], raf;
let player = { lane: 1, x: 0, y: 0, w: 50, h: 85, targetX: 0 };

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = window.innerHeight;
    player.y = canvas.height - 180;
    updateTargetX();
}
window.addEventListener('resize', resize);
resize();

// --- SISTEMA DE COMPARTILHAMENTO NATIVO ---
async function shareChallenge() {
    const gameUrl = window.location.href; 
    const shareText = `Desafio você a bater minha pontuação no Asphalt Escape! 🚗🔥\nMinha pontuação: ${Math.floor(score)}\n\nJogue aqui: ${gameUrl}`;
    if (navigator.share) {
        try { await navigator.share({ title: 'Desafio Asphalt Escape', text: shareText, url: gameUrl }); } 
        catch (err) { console.log("Cancelado"); }
    } else {
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`);
    }
}

// --- VIDA EXTRA ---
function revive() {
    if(coins >= 300) {
        coins -= 300;
        document.getElementById("coin-txt").innerText = coins;
        fuel = 100;
        enemies = [];
        items = [];
        document.getElementById("menu-over").style.display = "none";
        document.getElementById("ui").style.display = "flex";
        gameActive = true;
        update();
    }
}

function updateRanking(newScore) {
    let ranks = JSON.parse(localStorage.getItem('gms_ranks') || "[]");
    ranks.push(Math.floor(newScore));
    ranks.sort((a,b) => b-a);
    ranks = ranks.slice(0, 5);
    localStorage.setItem('gms_ranks', JSON.stringify(ranks));
    loadRanking();
}

function loadRanking() {
    const ranks = JSON.parse(localStorage.getItem('gms_ranks') || "[]");
    document.getElementById("ranking-list").innerHTML = ranks.map((s, i) => `<li>${i+1}º - ${s} pts</li>`).join("");
}
loadRanking();

function updateTargetX() { player.targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - (player.w / 2); }
function movePlayer(dir) { if(!gameActive) return; player.lane = Math.max(0, Math.min(2, player.lane + dir)); updateTargetX(); }

function initGame() {
    score = 0; speed = 7; fuel = 100; coins = 0; enemies = []; items = []; scenery = []; particles = [];
    player.lane = 1; updateTargetX(); player.x = player.targetX;
    document.getElementById("coin-txt").innerText = "0";
    document.getElementById("menu-main").style.display = "none";
    document.getElementById("menu-over").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    document.getElementById("game-ctrls").style.display = "flex";
    gameActive = true;
    update();
}

function drawVehicle(v) {
    ctx.fillStyle = v.color || "#444";
    ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 8); ctx.fill();
    if(v.isEasterEgg) {
        ctx.fillStyle = "white"; ctx.font = "bold 12px Arial";
        ctx.save(); ctx.translate(v.x+v.w-5, v.y+v.h-15); ctx.rotate(-Math.PI/2);
        ctx.fillText("GMS FLORESTAL", 0, 0); ctx.restore();
    }
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(v.x+8, v.y+10, v.w-16, 22);
}

function update() {
    if(!gameActive) return;
    ctx.fillStyle = "#222"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Scenery (Cerrado)
    if(Math.random() < 0.1) scenery.push({ x: Math.random() < 0.5 ? 5 : canvas.width - 25, y: -50, type: Math.random() > 0.5 ? '🌵' : '🌳' });
    scenery.forEach((s, i) => {
        s.y += speed; ctx.font = "20px Arial"; ctx.fillText(s.type, s.x, s.y);
        if(s.y > canvas.height) scenery.splice(i, 1);
    });

    // Road Lines
    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.setLineDash([40, 60]);
    ctx.lineDashOffset = -(score * 10);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*(canvas.width/3), 0); ctx.lineTo(i*(canvas.width/3), canvas.height); ctx.stroke();
    }

    player.x += (player.targetX - player.x) * 0.2;
    drawVehicle({...player, color: "#e74c3c"});

    // Items (Coins & Gas)
    if(Math.random() < 0.03) items.push({ type: Math.random() > 0.8 ? 'gas' : 'coin', x: (Math.floor(Math.random()*3) * (canvas.width/3)) + (canvas.width/6), y: -50 });
    
    items.forEach((it, i) => {
        it.y += speed; ctx.font = "20px Arial"; ctx.fillText(it.type === 'coin' ? '🪙' : '⛽', it.x-10, it.y);
        if(Math.hypot(player.x+25 - it.x, player.y+40 - it.y) < 40) {
            if(it.type === 'coin') { coins += 10; document.getElementById("coin-txt").innerText = coins; }
            else fuel = Math.min(100, fuel + 30);
            items.splice(i, 1);
        }
    });

    // --- LÓGICA ANTI-PAREDÃO ---
    if(Math.random() < 0.02 + (score/100000)) {
        let lane = Math.floor(Math.random()*3);
        // Verifica se a faixa tá livre e se não existem já 2 carros no topo (evita trancar as 3 faixas)
        let topEnemies = enemies.filter(e => e.y < 250);
        if(!enemies.some(e => e.lane === lane && e.y < 350) && topEnemies.length < 2) {
            let isEasterEgg = Math.random() < 0.02;
            let isLarge = score > 5000 && Math.random() > 0.8;
            enemies.push({
                lane, x: (lane * (canvas.width / 3)) + (canvas.width / 6) - (isLarge ? 40 : 25),
                y: -200, w: isLarge ? 80 : 50, h: isEasterEgg || isLarge ? 160 : 85,
                color: isEasterEgg ? "#1b5e20" : "#2980b9", isEasterEgg, speed: 2 + Math.random()*2
            });
        }
    }

    enemies.forEach((e, i) => {
        e.y += e.speed + (speed * 0.4); drawVehicle(e);
        if(player.x+8 < e.x+e.w-8 && player.x+player.w-8 > e.x+8 && player.y+8 < e.y+e.h-8 && player.y+player.h-8 > e.y+8) {
            gameOver();
        }
        if(e.isEasterEgg && e.y > player.y && !e.done) {
            score += 5000; e.done = true;
            document.getElementById("msg-box").style.display = "block";
            setTimeout(() => document.getElementById("msg-box").style.display = "none", 2500);
        }
        if(e.y > canvas.height) enemies.splice(i, 1);
    });

    if(gameActive) {
        score += 1; fuel -= 0.038;
        speed = 7 + (score/6000);
        document.getElementById("fuel-fill").style.width = fuel + "%";
        document.getElementById("score-txt").innerText = Math.floor(score);
        document.getElementById("km-txt").innerText = Math.floor(speed * 15) + " KM/H";
        if(fuel <= 0) gameOver();
    }
    raf = requestAnimationFrame(update);
}

function gameOver() {
    gameActive = false;
    updateRanking(score);
    document.getElementById("menu-over").style.display = "flex";
    document.getElementById("final-score-val").innerText = Math.floor(score);
    
    // Exibe botão de reviver se tiver moedas
    const btnRevive = document.getElementById("btn-revive");
    if(coins >= 300) btnRevive.style.display = "block";
    else btnRevive.style.display = "none";

    let m = "🥉 BRONZE";
    if(score >= 10000) m = "👑 LENDA";
    else if(score >= 6000) m = "🥇 OURO";
    else if(score >= 3000) m = "🥈 PRATA";
    document.getElementById("medal-txt").innerText = m;
}
</script>
</body>
</html>
