<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Highway v6.2 - GMS Elite</title>
    <style>
        :root { --gold: #f1c40f; --gas: #2ecc71; --blue: #3498db; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white; touch-action: none; }
        canvas { display: block; margin: auto; background: #222; }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; padding: 20px; }
        button { padding: 18px 45px; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; background: var(--gold); color: #000; cursor: pointer; box-shadow: 0 5px 0 #b7950b; }
        
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10; width: calc(100% - 30px); display: flex; justify-content: space-between; text-shadow: 2px 2px #000; }
        #fuel-wrap { width: 100px; height: 10px; background: #444; border-radius: 5px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); margin-top: 4px; }
        #fuel-fill { height: 100%; background: var(--gas); width: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-main" class="overlay">
        <h1 style="font-size: 42px; color: var(--gold); margin: 0;">HIGHWAY v6.2</h1>
        <p>RECORDE: <span id="record-display">0</span></p>
        <button onclick="initGame()">CORRER AGORA</button>
        <p>Gustavo Moreira | @eng.florestalgustavoms</p>
    </div>

    <div id="ui" style="display: none;">
        <div>
            <div id="km-txt" style="font-weight: bold;">0 KM/H</div>
            <div id="fuel-wrap"><div id="fuel-fill"></div></div>
            <small>GASOLINA</small>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 22px; color: var(--gold);">🪙 <span id="coin-txt">0</span></div>
            <div id="score-txt">SCORE: 0</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const laneWidth = canvas.width / 3;
let gameActive = false;
let score = 0, speed = 8, coins = 0, fuel = 100;
let enemies = [], items = [], rain = [], trees = [];
let night = false, explosionActive = false, explosionSize = 0;
let player = { lane: 1, x: 0, y: 0, w: 55, h: 90 };

// --- Áudio Engine ---
let audioCtx, osc, gain;
function setupAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        osc = audioCtx.createOscillator();
        gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(55, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start();
    } catch(e) { console.log("Audio not supported"); }
}

function initGame() {
    // LIMPEZA TOTAL DE OBJETOS (Correção do erro de reiniciar)
    enemies = []; 
    items = []; 
    rain = []; 
    trees = [];
    score = 0; 
    speed = 8; 
    coins = 0; 
    fuel = 100;
    explosionActive = false; 
    explosionSize = 0;

    document.getElementById("menu-main").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    
    player.lane = 1;
    player.x = player.lane * laneWidth + (laneWidth/2 - 27);
    player.y = canvas.height - 160;

    // Criar ambiente limpo
    for(let i=0; i<50; i++) rain.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: 8+Math.random()*8});
    for(let i=0; i<6; i++) trees.push({y: i * (canvas.height/5), side: i%2});

    if(!audioCtx) setupAudio();
    gameActive = true;
    requestAnimationFrame(mainLoop);
}

// --- Controles ---
let touchStartX = 0;
document.addEventListener("touchstart", e => touchStartX = e.touches[0].clientX);
document.addEventListener("touchmove", e => {
    if(!gameActive) return;
    let delta = e.touches[0].clientX - touchStartX;
    if(Math.abs(delta) > 50) {
        player.lane = Math.max(0, Math.min(2, player.lane + (delta > 0 ? 1 : -1)));
        touchStartX = e.touches[0].clientX;
    }
}, {passive: false});

function drawCar(v, color, type) {
    ctx.save();
    // Rodas e Sombra
    ctx.fillStyle = "#111";
    ctx.fillRect(v.x-2, v.y+15, 5, 20); ctx.fillRect(v.x+v.w-3, v.y+15, 5, 20);
    ctx.fillRect(v.x-2, v.y+v.h-35, 5, 20); ctx.fillRect(v.x+v.w-3, v.y+v.h-35, 5, 20);

    ctx.fillStyle = color;
    ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 10); ctx.fill();

    // Vidro
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(v.x+8, v.y+15, v.w-16, 25);

    if(type === 'police') {
        ctx.fillStyle = (Math.floor(Date.now()/100)%2===0) ? "red" : "blue";
        ctx.fillRect(v.x+10, v.y+45, v.w-20, 6);
    }
    ctx.restore();
}

function handleSpawning() {
    if(Math.floor(score) % 80 === 0) {
        // Anti-Paredão: Só spawna se houver pista livre
        if(enemies.filter(e => e.y < 250).length >= 2) return;

        let lane = Math.floor(Math.random()*3);
        let r = Math.random();
        
        // ZONA DE SEGURANÇA: Polícia não spawna na cara do player se ele estiver rápido
        let type = r > 0.85 ? "truck" : (r > 0.65 ? "police" : "car");
        
        enemies.push({ 
            type, lane, 
            x: lane * laneWidth + (laneWidth/2 - 27), 
            y: -200, w: 55, 
            h: type === "truck" ? 170 : 90, 
            speed: 3 + Math.random() * 2
        });
    }
    
    if(Math.random() < 0.01) {
        let l = Math.floor(Math.random()*3);
        items.push({ type: Math.random()<0.8 ? "coin" : "fuel", x: l*laneWidth + (laneWidth/2), y: -50 });
    }
}

function mainLoop() {
    if(!gameActive) return;

    ctx.fillStyle = "#3d3d3d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Estrada Lateral
    ctx.fillStyle = "#1e7a43";
    ctx.fillRect(0,0,15,canvas.height); ctx.fillRect(canvas.width-15,0,15,canvas.height);
    
    // Faixas
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.setLineDash([30, 30]); ctx.lineDashOffset = -(score * 8);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, canvas.height); ctx.stroke();
    }

    // Movimento Player
    let tx = player.lane * laneWidth + (laneWidth/2 - 27);
    player.x += (tx - player.x) * 0.2;
    drawCar(player, "#e74c3c", "player");

    handleSpawning();

    // Inimigos
    enemies.forEach((e, i) => {
        e.y += e.speed + (speed * 0.3);
        
        // IA POLÍCIA CORRIGIDA: Não bate de propósito, tenta cercar mantendo distância
        if(e.type === "police" && e.y < player.y - 150) {
            if(Math.random() < 0.01) { // Mudança de faixa lenta
                if(e.lane < player.lane) e.lane++; else if(e.lane > player.lane) e.lane--;
                e.x = e.lane * laneWidth + (laneWidth/2 - 27);
            }
        }

        drawCar(e, e.type === "truck" ? "#7f8c8d" : (e.type === "police" ? "#2c3e50" : "#2980b9"), e.type);

        // Colisão Precisa
        if(player.x < e.x+e.w-10 && player.x+player.w-10 > e.x && player.y < e.y+e.h-10 && player.y+player.h-10 > e.y) {
            explosionActive = true; gameActive = false;
        }
        if(e.y > canvas.height) { enemies.splice(i,1); score += 50; }
    });

    // Itens
    items.forEach((it, i) => {
        it.y += speed;
        ctx.fillStyle = it.type === "coin" ? "#f1c40f" : "#2ecc71";
        ctx.beginPath(); ctx.arc(it.x, it.y, 12, 0, Math.PI*2); ctx.fill();
        
        if(player.x < it.x+15 && player.x+player.w > it.x-15 && player.y < it.y+15 && player.y+player.h > it.y-15) {
            if(it.type === "coin") coins += 15; else fuel = Math.min(100, fuel+25);
            items.splice(i,1);
        }
    });

    fuel -= 0.018;
    if(fuel <= 0) { alert("PANE SECA!"); location.reload(); }
    
    score += 1; speed = 8 + (score/4000);
    if(osc) osc.frequency.setTargetAtTime(55 + (speed*5), audioCtx.currentTime, 0.1);

    document.getElementById("fuel-fill").style.width = fuel + "%";
    document.getElementById("score-txt").innerText = "SCORE: " + Math.floor(score);
    document.getElementById("km-txt").innerText = Math.floor(speed * 18) + " KM/H";
    document.getElementById("coin-txt").innerText = coins;

    if(explosionActive) {
        ctx.fillStyle = "orange"; ctx.beginPath(); 
        ctx.arc(player.x+27, player.y+45, explosionSize*6, 0, Math.PI*2); ctx.fill();
        explosionSize++;
        if(explosionSize > 20) {
            let rec = localStorage.getItem("gms_record") || 0;
            if(score > rec) localStorage.setItem("gms_record", Math.floor(score));
            alert("GAME OVER! Score: " + Math.floor(score));
            location.reload();
        }
    }

    if(gameActive) requestAnimationFrame(mainLoop);
}

document.getElementById("record-display").innerText = localStorage.getItem("gms_record") || 0;
</script>
</body>
</html>
