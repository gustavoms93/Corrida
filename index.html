<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Highway v3.0</title>
    <style>
        :root { --main-gold: #f1c40f; --night-overlay: rgba(0, 10, 40, 0.4); }
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        canvas { background: #333; flex: 1; width: 100%; max-width: 450px; margin: auto; display: block; }
        
        #ui-layer { position: absolute; top: 0; width: 100%; pointer-events: none; }
        #score-box { position: absolute; top: 20px; right: 20px; text-align: right; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 2px solid var(--main-gold); }
        
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        button { padding: 18px 40px; font-size: 24px; font-weight: bold; border: none; border-radius: 50px; background: var(--main-gold); color: #000; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px var(--main-gold); }
        button:hover { transform: scale(1.1); }

        #touch-controller { width: 100%; height: 120px; background: #111; border-top: 4px solid var(--main-gold); display: flex; align-items: center; justify-content: center; font-style: italic; color: #555; }
        
        .insta-link { color: #3498db; text-decoration: none; font-weight: bold; margin-top: 15px; display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu">
        <h1 style="font-size: 40px; margin-bottom: 5px;">HIGHWAY 3.0</h1>
        <p style="color: var(--main-gold); margin-bottom: 30px;">RECORD: <span id="record-val">0</span></p>
        <button onclick="initGame()">CORRER AGORA</button>
        <a href="https://www.instagram.com/eng.florestalgustavoms" class="insta-link" target="_blank">@eng.florestalgustavoms</a>
    </div>

    <div id="ui-layer">
        <div id="score-box">
            <div id="km">0 KM/H</div>
            <div id="points" style="font-size: 24px; color: var(--main-gold);">0</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="touch-controller">DESLIZE PARA OS LADOS</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let gameRunning = false;
let score = 0;
let speed = 8;
let nightMode = false;
let trees = [];
let enemies = [];
const laneWidth = 133; // 400/3

// Configurações do Jogador
let player = { lane: 1, x: 170, y: 0, w: 55, h: 95 };

// Áudio (Sintetizador de Motor)
let audioCtx, oscillator, gainNode;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    oscillator.type = 'sawtooth';
    oscillator.frequency.setValueAtTime(60, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
}

function updateEngineSound() {
    if (oscillator) {
        let freq = 60 + (speed * 5);
        oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
    }
}

function initGame() {
    canvas.width = 400;
    canvas.height = window.innerHeight - 120;
    player.y = canvas.height - 150;
    document.getElementById("menu").style.display = "none";
    document.getElementById("record-val").innerText = localStorage.getItem("highway_record") || 0;
    
    if(!audioCtx) initAudio();
    
    score = 0;
    speed = 8;
    enemies = [];
    trees = Array.from({length: 8}, (_, i) => ({y: i * 150, side: i % 2}));
    gameRunning = true;
    requestAnimationFrame(loop);
}

// Controle Touch Deslizante
let startX = 0;
document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
document.addEventListener('touchmove', e => {
    if (!gameRunning) return;
    let diff = e.touches[0].clientX - startX;
    if (Math.abs(diff) > 40) {
        if (diff > 0) move(1); else move(-1);
        startX = e.touches[0].clientX;
    }
});

function move(dir) {
    player.lane = Math.max(0, Math.min(2, player.lane + dir));
}

function drawVehicle(v, type) {
    ctx.save();
    // Sombra
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(v.x + 5, v.y + 5, v.w, v.h);

    // Corpo
    if(type === 'player') ctx.fillStyle = "#e74c3c";
    else if(type === 'truck') ctx.fillStyle = "#95a5a6";
    else if(type === 'police') ctx.fillStyle = "#2c3e50";
    else ctx.fillStyle = "#3498db";

    ctx.beginPath();
    ctx.roundRect(v.x, v.y, v.w, v.h, 8);
    ctx.fill();

    // Vidros
    ctx.fillStyle = "#111";
    ctx.fillRect(v.x + 8, v.y + 20, v.w - 16, 25);
    
    // Sirene Polícia
    if(type === 'police' && Math.floor(Date.now()/100) % 2 === 0) {
        ctx.fillStyle = "red"; ctx.fillRect(v.x + 5, v.y + 45, v.w/2, 5);
        ctx.fillStyle = "blue"; ctx.fillRect(v.x + v.w/2, v.y + 45, v.w/2, 5);
    }

    // Faróis Noite
    if(nightMode) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = "yellow";
        ctx.fillStyle = "yellow";
        ctx.fillRect(v.x + 5, v.y - 5, 15, 10);
        ctx.fillRect(v.x + v.w - 20, v.y - 5, 15, 10);
    }
    ctx.restore();
}

function spawnEnemy() {
    let lane = Math.floor(Math.random() * 3);
    if (enemies.some(e => e.lane === lane && e.y < 200)) return;
    
    let typeRand = Math.random();
    let type = 'car';
    let h = 95;
    if(typeRand > 0.8) { type = 'truck'; h = 180; }
    else if(typeRand > 0.6) { type = 'police'; }

    enemies.push({
        lane, type, h,
        x: lane * laneWidth + (laneWidth/2 - 27),
        y: -200, w: 55,
        speed: speed * (type === 'truck' ? 0.8 : 0.6)
    });
}

function loop() {
    if (!gameRunning) return;

    // Lógica Dia/Noite
    nightMode = (Math.floor(score/5000) % 2 !== 0);
    ctx.fillStyle = nightMode ? "#1a1a1a" : "#444";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grama e Árvores
    ctx.fillStyle = nightMode ? "#0d2b1a" : "#27ae60";
    ctx.fillRect(0, 0, 20, canvas.height);
    ctx.fillRect(canvas.width - 20, 0, 20, canvas.height);

    trees.forEach(t => {
        t.y += speed;
        ctx.fillStyle = "#3e2723"; // Tronco
        let x = t.side === 0 ? 5 : canvas.width - 15;
        ctx.fillRect(x, t.y, 10, 20);
        ctx.fillStyle = nightMode ? "#062206" : "#2ecc71"; // Folhas
        ctx.beginPath(); ctx.arc(x+5, t.y-10, 15, 0, Math.PI*2); ctx.fill();
        if(t.y > canvas.height) t.y = -50;
    });

    // Estrada (Faixas)
    ctx.strokeStyle = "white";
    ctx.setLineDash([30, 30]);
    ctx.lineDashOffset = -(score * 2);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, canvas.height); ctx.stroke();
    }

    // Jogador Suave
    let targetX = player.lane * laneWidth + (laneWidth/2 - 27);
    player.x += (targetX - player.x) * 0.15;
    drawVehicle(player, 'player');

    // Inimigos
    if(Math.random() < 0.02) spawnEnemy();
    enemies.forEach((e, i) => {
        e.y += e.speed + (speed * 0.2);
        drawVehicle(e, e.type);

        // Colisão Hitbox
        if(player.x < e.x+e.w-5 && player.x+player.w-5 > e.x && player.y < e.y+e.h-5 && player.y+player.h-5 > e.y) {
            gameRunning = false;
            gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            let record = localStorage.getItem("highway_record") || 0;
            if(score > record) localStorage.setItem("highway_record", Math.floor(score));
            alert("FIM DA LINHA! Score: " + Math.floor(score));
            location.reload();
        }
        if(e.y > canvas.height) { enemies.splice(i, 1); score += 100; }
    });

    // Efeito Noite (Overlay)
    if(nightMode) {
        ctx.fillStyle = "rgba(0, 10, 40, 0.3)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    score += 1;
    speed = 8 + (score / 2000);
    document.getElementById("points").innerText = Math.floor(score);
    document.getElementById("km").innerText = Math.floor(speed * 15) + " KM/H";
    
    updateEngineSound();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
